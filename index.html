<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>คอมเทพ - Home</title>
<style>
/* ----------------- Global ----------------- */
body {
  font-family: Arial, sans-serif;
  margin:0;
  color:#f5d300;
  overflow-x: hidden;
  position: relative;
}

/* ----------------- Particle Background ----------------- */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1; /* ให้อยู่ข้างหลัง content */
  top:0; left:0;
  background:#1c1c1c;
}

/* ----------------- Header ----------------- */
header {
  background: rgba(0,0,0,0.8);
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}
header .logo {
  font-size: 24px;
  font-weight: bold;
}
nav a {
  color:#f5d300;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}
nav a:hover { text-decoration: underline; }

/* ----------------- Hero / พรีเซนเตอร์ ----------------- */
.hero {
  text-align: center;
  margin-top: 60px;
  position: relative;
  z-index: 1;
}
.hero img {
  width: 300px;
  max-width: 80%;
  border-radius: 10px;
  box-shadow: 0 0 20px #f5d300;
  transition: transform 0.3s, box-shadow 0.3s;
}
.hero img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px #f5d300;
}

/* ----------------- Container / เนื้อหา ----------------- */
.container {
  padding: 40px 20px;
  text-align: center;
  position: relative;
  z-index: 1;
}
.container h1 { margin-top: 40px; }
.container p {
  font-size: 18px;
  max-width: 600px;
  margin: 20px auto;
  line-height: 1.6;
}

/* ----------------- Responsive ----------------- */
@media (max-width: 600px) {
  header { flex-direction: column; text-align: center; }
  nav a { display: block; margin: 5px 0; }
}
</style>
</head>
<body>

<!-- Particle Background -->
<div id="particles-js"></div>

<!-- Header -->
<header>
  <div class="logo">🖥️ ร้าน คอมเทพ</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="content.html">Content</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- Hero Section -->
<div class="container">
  <div class="hero">
    <img src="God.jpg" alt="เทพพรีเซนเตอร์">
  </div>
  <h1>ยินดีต้อนรับสู่ คอมเทพ</h1>
  <p>ร้านคอมพิวเตอร์และอุปกรณ์คุณภาพสูง สำหรับคอเกมและสายทำงานมืออาชีพ</p>
</div>

<!-- Particle JS Library -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
// Particle JS Config
particlesJS('particles-js',
{
  "particles": {
    "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
    "color": { "value": "#f5d300" },
    "shape": {
      "type": "circle",
      "stroke": { "width": 0, "color": "#000" }
    },
    "opacity": { "value": 0.5, "random": false },
    "size": { "value": 3, "random": true },
    "line_linked": {
      "enable": true,
      "distance": 150,
      "color": "#f5d300",
      "opacity": 0.4,
      "width": 1
    },
    "move": {
      "enable": true,
      "speed": 2,
      "direction": "none",
      "random": false,
      "straight": false,
      "out_mode": "out",
      "bounce": false
    }
  },
  "interactivity": {
    "detect_on": "canvas",
    "events": {
      "onhover": { "enable": true, "mode": "grab" },
      "onclick": { "enable": true, "mode": "push" },
      "resize": true
    },
    "modes": {
      "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
      "push": { "particles_nb": 4 }
    }
  },
  "retina_detect": true
});
</script>

</body>
</html>
