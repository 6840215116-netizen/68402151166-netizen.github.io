<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>คอมเทพ - Contact</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#1c1c1c; color:#f5d300; }
header { background:#000; padding:20px; text-align:center; font-size:24px; font-weight:bold; }
nav a { color:#f5d300; margin:0 15px; text-decoration:none; font-weight:bold; }
nav a:hover { text-decoration:underline; }
.container { padding:20px; max-width:700px; margin:auto; }
form input, form textarea { width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none; }
form button { padding:10px 15px; background:#f5d300; color:#000; border:none; font-weight:bold; cursor:pointer; border-radius:5px; }
form button:hover { background:#e6c200; }
.success { color: #0f0; margin-top:10px; }
.error { color: #f00; margin-top:10px; }
.signup-btn { display:block; margin:20px auto; padding:10px 20px; background:#00aaff; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:bold; text-decoration:none; text-align:center; }
.signup-btn:hover { background:#0088cc; }
</style>
</head>
<body>

<header>
🖥️ ร้าน คอมเทพ
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="content.html">Content</a>
  <a href="contact.html">Contact</a>
</nav>
</header>

<div class="container">
<h1>ติดต่อเรา</h1>

<!-- ปุ่มสมัคร EmailJS ฟรี -->
<a href="https://www.emailjs.com/signup/" target="_blank" class="signup-btn">สมัคร EmailJS ฟรี</a>

<form id="contact-form">
  <input type="text" name="user_name" placeholder="ชื่อของคุณ" required>
  <input type="email" name="user_email" placeholder="อีเมลของคุณ" required>
  <textarea name="message" rows="5" placeholder="ข้อความ" required></textarea>
  <button type="submit">ส่งข้อความ</button>
  <p id="form-status"></p>
</form>
</div>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("Dw3YnSe0URWe2ubSI"); // ใส่ User ID ของคุณ

document.getElementById('contact-form').addEventListener('submit', function(event) {
  event.preventDefault();
  const status = document.getElementById('form-status');
  
  emailjs.sendForm('808999', '555333', this)
    .then(() => {
      status.textContent = "ส่งข้อความเรียบร้อยแล้ว!";
      status.className = "success";
      this.reset();
    }, (err) => {
      status.textContent = "เกิดข้อผิดพลาด: " + JSON.stringify(err);
      status.className = "error";
    });
});
</script>

</body>
</html>
