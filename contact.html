<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>คอมเทพ - Contact</title>

<!-- Font Awesome (ไอคอน) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#1c1c1c;
  color:#f5d300;
}

/* Header */
header {
  background:#000;
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

nav a {
  color:#f5d300;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

nav a:hover {
  text-decoration:underline;
}

/* Container */
.container {
  padding:20px;
  max-width:700px;
  margin:auto;
}

/* Form */
form input, form textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:5px;
  border:none;
}

form input:focus, form textarea:focus {
  outline:none;
  box-shadow:0 0 5px #f5d300;
}

form button {
  padding:10px 15px;
  background:#f5d300;
  color:#000;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:5px;
  transition:0.3s;
}

form button:hover {
  background:#e6c200;
}

form button:active {
  transform:scale(0.95);
}

/* Status */
.success { color:#0f0; margin-top:10px; }
.error { color:#f00; margin-top:10px; }

/* Signup button */
.signup-btn {
  display:block;
  margin:20px auto;
  padding:10px 20px;
  background:#00aaff;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
  text-decoration:none;
  text-align:center;
}

.signup-btn:hover {
  background:#0088cc;
}

/* Contact links */
.contact-links {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:20px;
}

.contact-item {
  display:block;
  padding:12px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  text-align:center;
  transition:0.3s;
}

.fb { background:#1877f2; color:white; }
.ig { background:linear-gradient(45deg,#feda75,#d62976,#962fbf); color:white; }
.phone { background:#25d366; color:white; }

.contact-item:hover {
  transform:translateY(-3px);
  opacity:0.9;
}
</style>
</head>

<body>

<header>
🖥️ ร้าน คอมเทพ
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="content.html">Content</a>
  <a href="contact.html">Contact</a>
</nav>
</header>

<div class="container">

<h1>ติดต่อเรา</h1>

<!-- สมัคร EmailJS -->
<a href="https://www.emailjs.com/signup/" target="_blank" class="signup-btn">
สมัคร EmailJS ฟรี
</a>

<!-- ฟอร์ม -->
<form id="contact-form">
  <input type="text" name="user_name" placeholder="ชื่อของคุณ" required>
  <input type="email" name="user_email" placeholder="อีเมลของคุณ" required>
  <textarea name="message" rows="5" placeholder="ข้อความ" required></textarea>
  <button type="submit">ส่งข้อความ</button>
  <p id="form-status"></p>
</form>

<!-- ช่องทางติดต่อ -->
<h2>ช่องทางติดต่ออื่น</h2>

<div class="contact-links">
  <a href="https://www.facebook.com/KiraBrianna.ren" target="_blank" class="contact-item fb">
    <i class="fab fa-facebook"></i> Facebook
  </a>

  <a href="https://www.instagram.com/ren_02yy/" target="_blank" class="contact-item ig">
    <i class="fab fa-instagram"></i> Instagram
  </a>

  <a href="tel:0825460075" class="contact-item phone">
    <i class="fas fa-phone"></i> โทร 082-546-0075
  </a>
</div>

</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("Dw3YnSe0URWe2ubSI"); // 🔁 ใส่ Public Key ของคุณ

const form = document.getElementById('contact-form');
const status = document.getElementById('form-status');

form.addEventListener('submit', function(event) {
  event.preventDefault();

  status.textContent = "⏳ กำลังส่ง...";
  status.className = "";

  emailjs.sendForm('808999', '555333', this)
    .then(() => {
      status.textContent = "✅ ส่งข้อความเรียบร้อยแล้ว!";
      status.className = "success";
      form.reset();
    })
    .catch((err) => {
      status.textContent = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่";
      status.className = "error";
      console.error(err);
    });
});
</script>

</body>
</html>
